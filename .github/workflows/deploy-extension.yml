name: Deploy Chrome Extension (private)

# Push na `main` → build produkcione ekstenzije → upload + publish na Chrome Web Store.
#
# PRIVATNOST: vidljivost se NE kontroliše odavde. U CWS Developer Dashboard-u jednom
# postaviš listing na Visibility = Private i dodaš Google naloge koje pozivaš kao
# "trusted testers". Ovaj pipeline samo gura nove verzije paketa — one nasleđuju
# privatnu vidljivost listinga, pa ostaju dostupne samo pozvanim korisnicima.
#
# Jednokratni setup (secrets + listing) je opisan u docs/DEPLOY_EXTENSION.md.

on:
  # ACTIVE 2026-06-23: every push to `main` that touches the extension or shared
  # packages uploads a new version to the Chrome Web Store and submits it for
  # review; CWS auto-publishes once Google approves (the live version keeps serving
  # during review). Editing THIS workflow file does NOT trigger it (not in `paths`).
  # Manual runs (default dry_run = no upload) still work from the Actions tab.
  push:
    branches: [main]
    paths: # pokreni samo kad se ekstenzija ili deljeni paketi promene
      - 'apps/chrome-extension/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch: # ručno pokretanje iz Actions taba
    inputs:
      dry_run:
        description: 'Validate creds + zip WITHOUT uploading (no store submit)'
        type: boolean
        default: true

concurrency:
  group: deploy-extension
  cancel-in-progress: false # ne prekidaj upload koji je u toku

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      # Install ONLY the chrome-extension + its dependency closure (trailing `...`).
      # A full `pnpm install` also runs apps/website's `nuxt prepare` postinstall, which
      # fails on the Linux runner (missing oxc-parser native binding) and is irrelevant
      # to building the extension. The extension's own `wxt prepare` postinstall still runs.
      - name: Install
        run: pnpm install --frozen-lockfile --filter "@quikfill/chrome-extension..."

      # Quality gate — ne šaljemo na store ako ekstenzija ne prolazi.
      - name: Typecheck + test
        run: |
          pnpm --filter @quikfill/chrome-extension typecheck
          pnpm --filter @quikfill/chrome-extension test

      # CWS odbija upload ako verzija nije STROGO veća od poslednje objavljene na CWS-u.
      # App-served kanal (`pnpm deploy:chrome`) drži liniju 1.0.x; CWS pipeline koristi
      # 1.1.<run_number> da uvek ostane iznad nje i da se kanali ne sudare.
      # Major/minor menjaš ručno u package.json. Vidi docs/DEPLOY_EXTENSION.md.
      - name: Set release version
        working-directory: apps/chrome-extension
        run: npm pkg set version=1.1.${{ github.run_number }}

      - name: Build + zip (production)
        working-directory: apps/chrome-extension
        run: pnpm exec wxt zip
        env:
          # Bez ovoga produkcioni build pada (build:manifestGenerated hook u wxt.config.ts).
          WXT_QF_API_BASE_URL: ${{ secrets.WXT_QF_API_BASE_URL }}

      # `dry_run` (workflow_dispatch input, default = true) authenticates + validates
      # the zip but SKIPS upload/publish — safe to run while a review is pending. A
      # `push` (once un-paused) carries no input, so the expression is false → real submit.
      - name: Upload + publish to Chrome Web Store
        working-directory: apps/chrome-extension
        run: pnpm exec wxt submit ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }} --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
